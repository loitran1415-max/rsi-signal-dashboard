name: RSI Signal Scanner - TTCK Viet Nam

on:
  # Chay tu dong theo lich (UTC+7 = UTC-7h)
  # 9:05 ICT = 2:05 UTC | 10:05=3:05 | 11:05=4:05 | 11:35=4:35
  # 13:05=6:05 | 14:05=7:05 | 15:05=8:05 (Thu 2 - Thu 6)
  schedule:
    - cron: '5 2 * * 1-5'   # 09:05 ICT
    - cron: '5 3 * * 1-5'   # 10:05 ICT
    - cron: '5 4 * * 1-5'   # 11:05 ICT
    - cron: '35 4 * * 1-5'  # 11:35 ICT
    - cron: '5 6 * * 1-5'   # 13:05 ICT
    - cron: '5 7 * * 1-5'   # 14:05 ICT
    - cron: '5 8 * * 1-5'   # 15:05 ICT
  # Cho phep chay thu cong
  workflow_dispatch:
    inputs:
      use_priority_only:
        description: 'Chi scan ma uu tien (nhanh hon)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  scan:
    name: Scan RSI Signals
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RSI Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          USE_PRIORITY_ONLY: ${{ github.event.inputs.use_priority_only || 'false' }}
          SCAN_DELAY_SECONDS: '0.35'
        run: |
          echo "======================================"
          echo "RSI Signal Scanner - TTCK Viet Nam"
          echo "Time (UTC): $(date -u)"
          echo "Time (ICT): $(TZ='Asia/Ho_Chi_Minh' date)"
          echo "======================================"
          python scanner.py

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: |
            *.log
          if-no-files-found: ignore
          retention-days: 7
